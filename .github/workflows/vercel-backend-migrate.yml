name: Run backend migrations and seed

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate required secrets
        run: |
          test -n "$DATABASE_URL" || (echo "Missing GitHub Actions secret: DATABASE_URL" && exit 1)
          test -n "$JWT_SECRET_KEY" || (echo "Missing GitHub Actions secret: JWT_SECRET_KEY" && exit 1)
          test -n "$SEED_ADMIN_PASSWORD" || (echo "Missing GitHub Actions secret: SEED_ADMIN_PASSWORD" && exit 1)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}

      - name: Drop old enum types
        run: |
          python - <<'EOF'
          import psycopg, os
          conn = psycopg.connect(os.environ["DATABASE_URL"])
          conn.autocommit = True
          cur = conn.cursor()
          cur.execute("DROP TYPE IF EXISTS user_role CASCADE")
          cur.execute("DROP TYPE IF EXISTS action_type CASCADE")
          cur.execute("DROP TYPE IF EXISTS entity_type CASCADE")
          conn.close()
          print("Done")
          EOF
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}

      - name: Seed users and initial KB data
        if: success()
        run: python -m app.seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
