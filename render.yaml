services:
  - type: web
    name: baseknow-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: Contact Center Platform
      - key: ENVIRONMENT
        value: prod
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: baseknow-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: CORS_ORIGINS
        value: '["https://dinmukhamad.github.io"]'
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "25"
      - key: SEED_ADMIN_USERNAME
        value: admin
      - key: SEED_ADMIN_EMAIL
        value: admin@example.com
      - key: SEED_ADMIN_PASSWORD
        generateValue: true

databases:
  - name: baseknow-db
    databaseName: contact_center
    user: contact_center
